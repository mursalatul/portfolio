{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 — Lost in Space</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .error-content {
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 4rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 600px;
            margin: 2rem;
            animation: fadeIn 1s ease forwards;
        }
        .error-title {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .error-subtitle {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }
        .error-desc {
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .floating-astro {
            font-size: 4rem;
            display: inline-block;
            animation: float 6s ease-in-out infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <canvas id="particle-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>
    
    <div class="error-page">
        <div class="error-content">
            <div class="floating-astro">🚀</div>
            <h1 class="error-title">404</h1>
            <h2 class="error-subtitle">Lost in the Digital Cosmos</h2>
            <p class="error-desc">
                The coordinates you entered don't exist in this sector of the universe. 
                The page might have been moved to another galaxy, or it was just a phantom link.
            </p>
            <a href="/" class="btn-primary" style="display:inline-flex;">
                <span>←</span><span>Return to Base</span>
            </a>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
